{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ action }} Project - Fatma Chakhari</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
    <link rel="stylesheet" type="text/css" href="{% static 'css/main.css' %}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-gradient">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'admin_dashboard' %}">
            <i class="bi bi-arrow-left me-2"></i>Back to Dashboard
        </a>
        <div class="d-flex align-items-center gap-2">
            <span class="badge bg-warning text-dark">Admin</span>
            <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
            </a>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark Mode">
                <i class="bi bi-moon-fill" id="theme-icon"></i>
            </button>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-5">
                    <h3 class="fw-bold text-center mb-4">
                        <i class="bi bi-folder-plus me-2 text-primary"></i>{{ action }} Project
                    </h3>
                    <hr>
                    <form method="POST" class="mt-4">
                        {% csrf_token %}

                        <div class="mb-4">
                            <label class="form-label fw-semibold"><i class="bi bi-tag me-2"></i>Title *</label>
                            <input type="text" name="title" class="form-control form-control-lg"
                                value="{{ project.title|default:'' }}"
                                placeholder="Enter project title" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold"><i class="bi bi-text-paragraph me-2"></i>Description *</label>
                            <textarea name="description" class="form-control" rows="4"
                                placeholder="Describe your project...">{{ project.description|default:'' }}</textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold"><i class="bi bi-code-slash me-2"></i>Technology</label>
                            <input type="text" name="technology" class="form-control"
                                value="{{ project.technology|default:'' }}"
                                placeholder="e.g. React, Node.js, Python, Django">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold"><i class="bi bi-collection me-2"></i>Category</label>
                            <select name="category" class="form-select form-select-lg">
                                <option value="" disabled {% if not project.category %}selected{% endif %}>Select a category</option>
                                <option value="Web Development" {% if project.category == 'Web Development' %}selected{% endif %}>Web Development</option>
                                <option value="Mobile Development" {% if project.category == 'Mobile Development' %}selected{% endif %}>Mobile Development</option>
                                <option value="Cybersecurity" {% if project.category == 'Cybersecurity' %}selected{% endif %}>Cybersecurity</option>
                                <option value="Data Science" {% if project.category == 'Data Science' %}selected{% endif %}>Data Science</option>
                                <option value="DevOps" {% if project.category == 'DevOps' %}selected{% endif %}>DevOps</option>
                                <option value="Other" {% if project.category == 'Other' %}selected{% endif %}>Other</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold"><i class="bi bi-github me-2"></i>GitHub Link</label>
                            <input type="url" name="github_link" class="form-control"
                                value="{{ project.github_link|default:'' }}"
                                placeholder="https://github.com/chakhari-dotcom/...">
                        </div>

                        <div class="d-grid gap-2 mt-5">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-check-circle me-2"></i>{{ action }} Project
                            </button>
                            <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle me-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleTheme() {
        const html = document.documentElement;
        const icon = document.getElementById('theme-icon');
        const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);
        icon.className = newTheme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        localStorage.setItem('theme', newTheme);
        applyTheme(newTheme);
    }
    function applyTheme(theme) {
        const r = document.documentElement;
        if (theme === 'dark') {
            r.style.setProperty('--bg-primary','#0f172a'); r.style.setProperty('--bg-secondary','#1e293b');
            r.style.setProperty('--bg-card','#1e293b'); r.style.setProperty('--text-primary','#f1f5f9');
            r.style.setProperty('--text-secondary','#cbd5e1'); r.style.setProperty('--text-muted','#94a3b8');
            r.style.setProperty('--border-color','#334155');
        } else {
            r.style.setProperty('--bg-primary','#fafbfc'); r.style.setProperty('--bg-secondary','#f3f4f6');
            r.style.setProperty('--bg-card','#ffffff'); r.style.setProperty('--text-primary','#1f2937');
            r.style.setProperty('--text-secondary','#4b5563'); r.style.setProperty('--text-muted','#9ca3af');
            r.style.setProperty('--border-color','#e5e7eb');
        }
    }
    document.addEventListener('DOMContentLoaded', function() {
        const saved = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);
        document.getElementById('theme-icon').className = saved === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        applyTheme(saved);
    });
</script>
</body>
</html>
