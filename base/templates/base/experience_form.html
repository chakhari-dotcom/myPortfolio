{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Experience - Fatma Chakhari</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-gradient">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'admin_dashboard' %}">
            <i class="bi bi-code-slash me-2"></i>Fatma Chakhari
        </a>
        <div class="ms-auto d-flex align-items-center gap-2">
            <span class="badge bg-warning text-dark">Admin</span>
            <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
            </a>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark Mode">
                <i class="bi bi-moon-fill" id="theme-icon"></i>
            </button>
        </div>
    </div>
</nav>

<div class="container py-5" style="max-width: 650px;">
    <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary btn-sm mb-4">
        <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
    </a>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-5">
            <h3 class="fw-bold mb-4">
                <i class="bi bi-briefcase me-2 text-primary"></i>Add Experience
            </h3>
            <hr class="mb-4">

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">Job Title *</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-person-badge"></i></span>
                        <input type="text" name="title" class="form-control" placeholder="e.g. Développeuse Full Stack" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Company *</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-building"></i></span>
                        <input type="text" name="company" class="form-control" placeholder="e.g. Reactit · Stage" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Location</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-geo-alt"></i></span>
                        <input type="text" name="location" class="form-control" placeholder="e.g. Sousse, Tunisie · Sur site">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Start Date *</label>
                        <input type="date" name="start_date" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">End Date</label>
                        <input type="date" name="end_date" class="form-control">
                        <div class="form-text">Leave empty if currently working here.</div>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="form-check">
                        <input type="checkbox" name="is_current" class="form-check-input" id="is_current">
                        <label class="form-check-label fw-semibold" for="is_current">
                            I currently work here
                        </label>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea name="description" class="form-control" rows="5"
                        placeholder="Describe your role, responsibilities and achievements..."></textarea>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="bi bi-plus-circle me-2"></i>Add Experience
                    </button>
                    <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-circle me-2"></i>Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleTheme() {
        const html = document.documentElement;
        const icon = document.getElementById('theme-icon');
        const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);
        icon.className = newTheme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        localStorage.setItem('theme', newTheme);
        applyTheme(newTheme);
    }
    function applyTheme(theme) {
        const r = document.documentElement;
        if (theme === 'dark') {
            r.style.setProperty('--bg-primary','#0f172a'); r.style.setProperty('--bg-card','#1e293b');
            r.style.setProperty('--text-primary','#f1f5f9'); r.style.setProperty('--text-muted','#94a3b8');
        } else {
            r.style.setProperty('--bg-primary','#fafbfc'); r.style.setProperty('--bg-card','#ffffff');
            r.style.setProperty('--text-primary','#1f2937'); r.style.setProperty('--text-muted','#9ca3af');
        }
    }
    document.addEventListener('DOMContentLoaded', function() {
        const saved = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);
        document.getElementById('theme-icon').className = saved === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        applyTheme(saved);
    });
</script>
</body>
</html>
