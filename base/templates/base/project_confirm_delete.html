{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Project - Fatma Chakhari</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
    <link rel="stylesheet" type="text/css" href="{% static 'css/main.css' %}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-gradient">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'admin_dashboard' %}">
            <i class="bi bi-arrow-left me-2"></i>Back to Dashboard
        </a>
        <div class="d-flex align-items-center gap-2">
            <span class="badge bg-warning text-dark">Admin</span>
            <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
            </a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-5 text-center">
                    <div class="mb-4">
                        <i class="bi bi-trash display-1 text-danger"></i>
                    </div>
                    <h3 class="fw-bold mb-3">Delete Project</h3>
                    <p class="text-muted mb-1">Are you sure you want to delete:</p>
                    <h5 class="fw-bold text-primary mb-4">"{{ project.title }}"</h5>
                    <p class="text-muted small mb-4">This action cannot be undone. The project will be permanently removed from both the admin and recruiter views.</p>

                    <form method="POST">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg">
                                <i class="bi bi-trash me-2"></i>Yes, Delete Project
                            </button>
                            <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary btn-lg">
                                <i class="bi bi-x-circle me-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
