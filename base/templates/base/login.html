<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Portfolio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f4f4f7; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: #fff; border: 1px solid #e8e8ec; border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 400px; }
    .logo { width: 44px; height: 44px; border-radius: 50%; background: #1a1a2e; display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; }
    .logo span { color: #fff; font-weight: 600; font-size: 16px; }
    h1 { font-size: 22px; font-weight: 600; color: #1a1a2e; margin-bottom: 0.4rem; }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 2rem; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
    input[type="text"], input[type="password"] { width: 100%; padding: 10px 12px; font-size: 15px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; color: #1a1a2e; margin-bottom: 1rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus { border-color: #534AB7; box-shadow: 0 0 0 3px rgba(83,74,183,0.1); background: #fff; }
    .error { background: #fff0f0; border: 1px solid #ffcccc; color: #cc0000; font-size: 13px; padding: 10px 12px; border-radius: 8px; margin-bottom: 1rem; }
    .btn { width: 100%; padding: 11px; font-size: 15px; font-weight: 600; background: #1a1a2e; color: #fff; border: none; border-radius: 8px; cursor: pointer; margin-top: 0.25rem; transition: background 0.2s; }
    .btn:hover { background: #2d2b52; }
    .hint { font-size: 13px; color: #777; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #f0f0f0; line-height: 1.8; }
    .tag { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 20px; margin-right: 4px; }
    .tag-r { background: #E1F5EE; color: #0F6E56; }
    .tag-a { background: #EEEDFE; color: #3C3489; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span>CK</span></div>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to view the portfolio</p>

    {% if messages %}
      {% for msg in messages %}
        <div class="error">{{ msg }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Enter your username" required>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required>
      <button type="submit" class="btn">Sign in</button>
    </form>

    <div class="hint">
      <span class="tag tag-r">Recruiter</span> Use the credentials shared with you.<br><br>
      <span class="tag tag-a">Admin</span> Use your superuser credentials.
    </div>
  </div>
</body>
</html>
