{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ action }} Projet - FATMA CHAKHARI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
    <link rel="stylesheet" type="text/css" href="{% static 'css/main.css' %}">
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-dark bg-gradient">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'home' %}"><i class="bi bi-arrow-left me-2"></i>Back to Portfolio</a>
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark Mode">
            <i class="bi bi-moon-fill" id="theme-icon"></i>
        </button>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-5">
                    <h3 class="fw-bold text-center mb-4"><i class="bi bi-folder-plus me-2 text-primary"></i>{{ action }} Project</h3>
                    <hr>
                    <form method="POST" class="mt-4">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label fw-semibold"><i class="bi bi-tag me-2"></i>Title</label>
                            <input type="text" name="title" class="form-control form-control-lg" value="{{ project.title|default:'' }}" placeholder="Enter project title" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold"><i class="bi bi-text-paragraph me-2"></i>Description</label>
                            <textarea name="description" class="form-control" rows="4" placeholder="Describe your project..." required>{{ project.description|default:'' }}</textarea>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold"><i class="bi bi-code-slash me-2"></i>Technology</label>
                            <input type="text" name="technology" class="form-control" value="{{ project.technology|default:'' }}" placeholder="e.g., React, Node.js, Python" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold"><i class="bi bi-collection me-2"></i>Category</label>
                            <select name="category" class="form-select form-select-lg" required>
                                <option value="" disabled selected>Select a category</option>
                                {% for cat in categories %}
                                <option value="{{ cat.id }}" {% if project.category.id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="d-grid gap-2 mt-5">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-check-circle me-2"></i>{{ action }}
                            </button>
                            <a href="{% url 'home' %}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle me-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleTheme() {
        const html = document.documentElement;
        const icon = document.getElementById('theme-icon');
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        
        html.setAttribute('data-theme', newTheme);
        
        if (newTheme === 'dark') {
            icon.classList.remove('bi-moon-fill');
            icon.classList.add('bi-sun-fill');
        } else {
            icon.classList.remove('bi-sun-fill');
            icon.classList.add('bi-moon-fill');
        }
        
        localStorage.setItem('theme', newTheme);
        applyTheme(newTheme);
    }

    function applyTheme(theme) {
        const root = document.documentElement;
        if (theme === 'dark') {
            root.style.setProperty('--bg-primary', '#0f172a');
            root.style.setProperty('--bg-secondary', '#1e293b');
            root.style.setProperty('--bg-card', '#1e293b');
            root.style.setProperty('--text-primary', '#f1f5f9');
            root.style.setProperty('--text-secondary', '#cbd5e1');
            root.style.setProperty('--text-muted', '#94a3b8');
            root.style.setProperty('--border-color', '#334155');
        } else {
            root.style.setProperty('--bg-primary', '#fafbfc');
            root.style.setProperty('--bg-secondary', '#f3f4f6');
            root.style.setProperty('--bg-card', '#ffffff');
            root.style.setProperty('--text-primary', '#1f2937');
            root.style.setProperty('--text-secondary', '#4b5563');
            root.style.setProperty('--text-muted', '#9ca3af');
            root.style.setProperty('--border-color', '#e5e7eb');
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        const icon = document.getElementById('theme-icon');
        
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        if (savedTheme === 'dark') {
            icon.classList.remove('bi-moon-fill');
            icon.classList.add('bi-sun-fill');
        }
        
        applyTheme(savedTheme);
    });
</script>
</body>
</html>
